<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth Flow Debugger</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .debug-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .warning { background-color: #fff3cd; border-color: #ffeaa7; }
        .info { background-color: #d1ecf1; border-color: #bee5eb; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .log { background: #f8f9fa; padding: 10px; border-radius: 3px; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
    <h1>🔍 OAuth Flow Debugger</h1>
    
    <div class="debug-section info">
        <h3>Current Status</h3>
        <p><strong>URL:</strong> <span id="currentUrl"></span></p>
        <p><strong>Has Code:</strong> <span id="hasCode"></span></p>
        <p><strong>Has Error:</strong> <span id="hasError"></span></p>
        <p><strong>Session Storage:</strong> <span id="sessionStatus"></span></p>
    </div>

    <div class="debug-section">
        <h3>OAuth Parameters</h3>
        <div id="oauthParams"></div>
    </div>

    <div class="debug-section">
        <h3>Debug Actions</h3>
        <button onclick="testOAuthUrl()">Test OAuth URL Generation</button>
        <button onclick="simulateCallback()">Simulate OAuth Callback</button>
        <button onclick="testTokenExchange()">Test Token Exchange</button>
        <button onclick="clearAllData()">Clear All Data</button>
        <button onclick="checkMainApp()">Check Main App Status</button>
    </div>

    <div class="debug-section">
        <h3>Debug Log</h3>
        <div id="debugLog" class="log"></div>
        <button onclick="clearLog()">Clear Log</button>
    </div>

    <script>
        let debugLog = [];

        function log(message, type = 'info') {
            const timestamp = new Date().toISOString();
            const logEntry = `[${timestamp}] ${message}`;
            debugLog.push(logEntry);
            
            const logDiv = document.getElementById('debugLog');
            const logElement = document.createElement('div');
            logElement.textContent = logEntry;
            logElement.style.color = type === 'error' ? 'red' : type === 'success' ? 'green' : type === 'warning' ? 'orange' : 'black';
            logDiv.appendChild(logElement);
            logDiv.scrollTop = logDiv.scrollHeight;
            
            console.log(logEntry);
        }

        function updateStatus() {
            document.getElementById('currentUrl').textContent = window.location.href;
            
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const error = urlParams.get('error');
            
            document.getElementById('hasCode').textContent = code ? 'Yes' : 'No';
            document.getElementById('hasError').textContent = error || 'No';
            document.getElementById('sessionStatus').textContent = sessionStorage.getItem('oauth_callback_processed') ? 'Processed' : 'Not Processed';
            
            // Display OAuth parameters
            const oauthDiv = document.getElementById('oauthParams');
            oauthDiv.innerHTML = `
                <p><strong>Code:</strong> ${code ? code.substring(0, 20) + '...' : 'None'}</p>
                <p><strong>Error:</strong> ${error || 'None'}</p>
                <p><strong>Error Description:</strong> ${urlParams.get('error_description') || 'None'}</p>
                <p><strong>State:</strong> ${urlParams.get('state') || 'None'}</p>
            `;
        }

        function testOAuthUrl() {
            log('🔗 Testing OAuth URL generation...', 'info');
            
            const clientId = 'ilzOKY6UAvIWTzwnOIC73cjd3rRxy5CfFx0S6a01Mzc4VKWo';
            const redirectUri = encodeURIComponent(window.location.origin + '/auth/callback');
            const scopes = encodeURIComponent('data:read data:write bucket:read bucket:create viewables:read');
            
            const authUrl = `https://developer.api.autodesk.com/authentication/v2/authorize?response_type=code&client_id=${clientId}&redirect_uri=${redirectUri}&scope=${scopes}&code_challenge=test&code_challenge_method=S256`;
            
            log('Generated OAuth URL:', 'info');
            log(authUrl, 'info');
            
            // Test if URL is valid
            try {
                new URL(authUrl);
                log('✅ OAuth URL is valid', 'success');
            } catch (error) {
                log('❌ OAuth URL is invalid: ' + error.message, 'error');
            }
        }

        function simulateCallback() {
            log('🔄 Simulating OAuth callback...', 'info');
            
            const testCode = 'test_oauth_code_' + Date.now();
            const callbackUrl = `/?code=${testCode}`;
            
            log('Simulated callback URL: ' + callbackUrl, 'info');
            log('Redirecting to simulate callback...', 'warning');
            
            setTimeout(() => {
                window.location.href = callbackUrl;
            }, 1000);
        }

        async function testTokenExchange() {
            log('🔄 Testing token exchange...', 'info');
            
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            
            if (!code) {
                log('❌ No authorization code found in URL', 'error');
                return;
            }
            
            log('Found authorization code: ' + code.substring(0, 20) + '...', 'info');
            
            try {
                const response = await fetch('https://developer.api.autodesk.com/authentication/v2/token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        client_id: 'ilzOKY6UAvIWTzwnOIC73cjd3rRxy5CfFx0S6a01Mzc4VKWo',
                        client_secret: 'fwAMvFSSo7TsrYA1TVzqRnxt2j7j2kCNtmbOkgO2rau4HBjfaUXUn0u3FsQbpOBa',
                        code: code,
                        redirect_uri: window.location.origin + '/auth/callback',
                        code_verifier: 'test_code_verifier' // This should be the actual PKCE verifier
                    })
                });
                
                log('Token exchange response status: ' + response.status, 'info');
                
                if (response.ok) {
                    const data = await response.json();
                    log('✅ Token exchange successful!', 'success');
                    log('Access token: ' + (data.access_token ? 'Present' : 'Missing'), 'info');
                    log('Refresh token: ' + (data.refresh_token ? 'Present' : 'Missing'), 'info');
                    log('Expires in: ' + (data.expires_in || 'Unknown') + ' seconds', 'info');
                } else {
                    const errorData = await response.text();
                    log('❌ Token exchange failed: ' + response.status, 'error');
                    log('Error details: ' + errorData, 'error');
                }
            } catch (error) {
                log('❌ Token exchange error: ' + error.message, 'error');
            }
        }

        function clearAllData() {
            log('🧹 Clearing all data...', 'warning');
            
            localStorage.removeItem('zoyantra_credentials');
            sessionStorage.clear();
            
            log('✅ All data cleared', 'success');
            updateStatus();
        }

        function checkMainApp() {
            log('🔍 Checking main app status...', 'info');
            
            // Check if we're on the main app or callback
            if (window.location.pathname === '/auth/callback') {
                log('📍 Currently on callback page', 'info');
                log('Callback URL: ' + window.location.href, 'info');
            } else if (window.location.pathname === '/' || window.location.pathname === '') {
                log('📍 Currently on main app', 'info');
                
                // Check for OAuth parameters
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                if (code) {
                    log('✅ OAuth code found in main app URL', 'success');
                    log('Code: ' + code.substring(0, 20) + '...', 'info');
                } else {
                    log('⚠️ No OAuth code in main app URL', 'warning');
                }
            } else {
                log('📍 Currently on: ' + window.location.pathname, 'info');
            }
            
            // Check session storage
            const callbackProcessed = sessionStorage.getItem('oauth_callback_processed');
            log('Session callback processed: ' + (callbackProcessed || 'Not set'), 'info');
        }

        function clearLog() {
            debugLog = [];
            document.getElementById('debugLog').innerHTML = '';
        }

        // Initialize
        updateStatus();
        log('🚀 OAuth Flow Debugger initialized', 'success');
        
        // Auto-check if we have OAuth parameters
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const error = urlParams.get('error');
        
        if (code) {
            log('🔍 OAuth code detected in URL', 'info');
            log('Code: ' + code.substring(0, 20) + '...', 'info');
        }
        
        if (error) {
            log('❌ OAuth error detected: ' + error, 'error');
            log('Error description: ' + (urlParams.get('error_description') || 'None'), 'error');
        }
    </script>
</body>
</html>
