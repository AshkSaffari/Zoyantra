<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug ACC Project Access</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 20px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            max-width: 800px;
            margin: 0 auto;
        }
        button { 
            padding: 12px 24px; 
            margin: 10px 5px; 
            cursor: pointer; 
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .debug-btn {
            background: linear-gradient(45deg, #3498db, #2980b9);
            color: white;
        }
        .debug-btn:hover {
            background: linear-gradient(45deg, #2980b9, #3498db);
            transform: translateY(-2px);
        }
        .success { 
            color: #2ecc71; 
            background: rgba(46, 204, 113, 0.1);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #2ecc71;
            margin: 10px 0;
        }
        .error { 
            color: #e74c3c; 
            background: rgba(231, 76, 60, 0.1);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #e74c3c;
            margin: 10px 0;
        }
        .info {
            background: rgba(52, 152, 219, 0.1);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #3498db;
            margin: 10px 0;
        }
        .code {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            margin: 10px 0;
            word-break: break-all;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .results {
            max-height: 400px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Debug ACC Project Access</h1>
        
        <div class="info">
            <strong>Project ID:</strong> <span id="projectId">b.5fec8f39-7a15-48c4-973a-789cc5906a63</span><br>
            <strong>Hub ID:</strong> <span id="hubId">b.ddc5f6e2-9ddc-475e-82ed-b05da4ac18c2</span>
        </div>

        <div style="text-align: center; margin: 20px 0;">
            <button class="debug-btn" onclick="checkCredentials()">🔑 Check Credentials</button>
            <button class="debug-btn" onclick="testProjectAccess()">📁 Test Project Access</button>
            <button class="debug-btn" onclick="testHubAccess()">🏢 Test Hub Access</button>
            <button class="debug-btn" onclick="testProjectVariations()">🔄 Test Project ID Variations</button>
        </div>

        <div id="results" class="results">
            <div class="info">Click a button above to start debugging...</div>
        </div>
    </div>

    <script>
        const projectId = 'b.5fec8f39-7a15-48c4-973a-789cc5906a63';
        const hubId = 'b.ddc5f6e2-9ddc-475e-82ed-b05da4ac18c2';

        function log(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = type;
            div.innerHTML = message;
            results.appendChild(div);
            results.scrollTop = results.scrollHeight;
        }

        function getHeaders() {
            const credentials = JSON.parse(localStorage.getItem('zoyantra_credentials') || '{}');
            return {
                'Authorization': `Bearer ${credentials.threeLegToken}`,
                'Content-Type': 'application/json'
            };
        }

        async function checkCredentials() {
            log('🔑 Checking stored credentials...', 'info');
            
            try {
                const credentials = JSON.parse(localStorage.getItem('zoyantra_credentials') || '{}');
                
                if (!credentials.threeLegToken) {
                    log('❌ No 3-legged token found in localStorage', 'error');
                    return;
                }
                
                log(`✅ 3-legged token found: ${credentials.threeLegToken.substring(0, 20)}...`, 'success');
                
                // Test token validity
                const response = await fetch('https://developer.api.autodesk.com/userprofile/v1/users/@me', {
                    headers: getHeaders()
                });
                
                if (response.ok) {
                    const userData = await response.json();
                    log(`✅ Token is valid. User: ${userData.firstName} ${userData.lastName}`, 'success');
                } else {
                    log(`❌ Token is invalid: ${response.status} ${response.statusText}`, 'error');
                }
                
            } catch (error) {
                log(`❌ Error checking credentials: ${error.message}`, 'error');
            }
        }

        async function testProjectAccess() {
            log('📁 Testing project access...', 'info');
            
            const variations = [
                projectId,
                projectId.replace('b.', ''),
                `urn:adsk.dtm:${projectId}`,
                `urn:adsk.dtm:Project:${projectId}`
            ];
            
            for (const variation of variations) {
                try {
                    log(`🔍 Testing project ID format: <span class="code">${variation}</span>`, 'info');
                    
                    const response = await fetch(`https://developer.api.autodesk.com/project/v1/projects/${variation}`, {
                        headers: getHeaders()
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        log(`✅ Project found with format: <span class="code">${variation}</span>`, 'success');
                        log(`📋 Project name: ${data.data?.attributes?.name || 'Unknown'}`, 'info');
                        return;
                    } else {
                        log(`❌ Format ${variation} failed: ${response.status} ${response.statusText}`, 'error');
                    }
                } catch (error) {
                    log(`❌ Format ${variation} error: ${error.message}`, 'error');
                }
            }
            
            log('❌ No project ID format worked', 'error');
        }

        async function testHubAccess() {
            log('🏢 Testing hub access...', 'info');
            
            try {
                const response = await fetch(`https://developer.api.autodesk.com/project/v1/hubs/${hubId}`, {
                    headers: getHeaders()
                });
                
                if (response.ok) {
                    const data = await response.json();
                    log(`✅ Hub found: ${data.data?.attributes?.name || 'Unknown'}`, 'success');
                    
                    // Try to get projects in this hub
                    const projectsResponse = await fetch(`https://developer.api.autodesk.com/project/v1/hubs/${hubId}/projects`, {
                        headers: getHeaders()
                    });
                    
                    if (projectsResponse.ok) {
                        const projectsData = await projectsResponse.json();
                        log(`📋 Found ${projectsData.data?.length || 0} projects in hub`, 'info');
                        
                        // Look for our specific project
                        const ourProject = projectsData.data?.find(p => p.id === projectId);
                        if (ourProject) {
                            log(`✅ Our project found in hub: ${ourProject.attributes?.name || 'Unknown'}`, 'success');
                        } else {
                            log(`❌ Our project not found in hub projects list`, 'error');
                        }
                    }
                } else {
                    log(`❌ Hub access failed: ${response.status} ${response.statusText}`, 'error');
                }
            } catch (error) {
                log(`❌ Hub access error: ${error.message}`, 'error');
            }
        }

        async function testProjectVariations() {
            log('🔄 Testing all project ID variations...', 'info');
            
            const variations = [
                projectId,
                projectId.replace('b.', ''),
                `urn:adsk.dtm:${projectId}`,
                `urn:adsk.dtm:Project:${projectId}`,
                `urn:adsk.dtm:Project:${projectId.replace('b.', '')}`,
                `urn:adsk.dtm:${projectId.replace('b.', '')}`
            ];
            
            for (const variation of variations) {
                try {
                    log(`🔍 Testing: <span class="code">${variation}</span>`, 'info');
                    
                    // Test project endpoint
                    const projectResponse = await fetch(`https://developer.api.autodesk.com/project/v1/projects/${variation}`, {
                        headers: getHeaders()
                    });
                    
                    if (projectResponse.ok) {
                        log(`✅ Project endpoint works: <span class="code">${variation}</span>`, 'success');
                        
                        // Test top folders
                        const foldersResponse = await fetch(`https://developer.api.autodesk.com/project/v1/projects/${variation}/topFolders`, {
                            headers: getHeaders()
                        });
                        
                        if (foldersResponse.ok) {
                            const foldersData = await foldersResponse.json();
                            log(`✅ Top folders accessible: ${foldersData.data?.length || 0} folders`, 'success');
                        } else {
                            log(`❌ Top folders failed: ${foldersResponse.status}`, 'error');
                        }
                        
                        return;
                    } else {
                        log(`❌ Project endpoint failed: ${projectResponse.status}`, 'error');
                    }
                } catch (error) {
                    log(`❌ Variation ${variation} error: ${error.message}`, 'error');
                }
            }
        }

        // Auto-run basic checks on page load
        window.addEventListener('load', () => {
            log('🔧 ACC Project Debug Tool loaded', 'info');
            log(`📋 Project ID: <span class="code">${projectId}</span>`, 'info');
            log(`📋 Hub ID: <span class="code">${hubId}</span>`, 'info');
        });
    </script>
</body>
</html>
