<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Outer hexagon gradient -->
    <linearGradient id="outerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="25%" stop-color="#A855F7" />
      <stop offset="50%" stop-color="#C084FC" />
      <stop offset="75%" stop-color="#DDD6FE" />
      <stop offset="100%" stop-color="#F3E8FF" />
    </linearGradient>
    
    <!-- Inner hexagon gradient -->
    <linearGradient id="innerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E91E63" />
      <stop offset="50%" stop-color="#EC4899" />
      <stop offset="100%" stop-color="#F472B6" />
    </linearGradient>
    
    <!-- Z gradient -->
    <linearGradient id="zGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="50%" stop-color="#FFA500" />
      <stop offset="100%" stop-color="#FF8C00" />
    </linearGradient>
    
    <!-- Glow effects -->
    <filter id="outerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="innerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="zGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer hexagon with glow -->
  <polygon 
    points="64,12 104,36 104,92 64,116 24,92 24,36" 
    fill="url(#outerGradient)" 
    stroke="#8B5CF6" 
    stroke-width="3"
    filter="url(#outerGlow)"
  />
  
  <!-- Inner hexagon -->
  <polygon 
    points="64,20 96,40 96,88 64,108 32,88 32,40" 
    fill="url(#innerGradient)" 
    stroke="#E91E63" 
    stroke-width="2"
    filter="url(#innerGlow)"
  />
  
  <!-- Central Z with enhanced styling -->
  <text 
    x="64" 
    y="75" 
    text-anchor="middle" 
    font-size="42" 
    font-weight="900" 
    fill="url(#zGradient)"
    font-family="Inter, Arial, sans-serif"
    filter="url(#zGlow)"
    style="text-shadow: 2px 2px 4px rgba(0,0,0,0.3);"
  >
    Z
  </text>
</svg>
