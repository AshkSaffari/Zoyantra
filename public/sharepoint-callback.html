<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SharePoint Authentication Callback</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #0078d4;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 {
            color: #333;
            margin-bottom: 1rem;
        }
        p {
            color: #666;
            margin-bottom: 1rem;
        }
        .success {
            color: #28a745;
        }
        .error {
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>SharePoint Organization Approval</h1>
        <p id="status">Processing organization approval...</p>
        <p id="message">Please wait while we complete your SharePoint connection and verify organization approval.</p>
    </div>

    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const error = urlParams.get('error');
        const errorDescription = urlParams.get('error_description');
        const state = urlParams.get('state');

        const statusElement = document.getElementById('status');
        const messageElement = document.getElementById('message');

        if (error) {
            statusElement.textContent = 'Organization Approval Denied';
            statusElement.className = 'error';
            messageElement.textContent = `Your organization has denied access: ${error}${errorDescription ? ' - ' + errorDescription : ''}`;
            
            // Redirect back to main app after 3 seconds
            setTimeout(() => {
                window.location.href = '/';
            }, 3000);
        } else if (code && state === 'sharepoint_auth') {
            statusElement.textContent = 'Organization Approval Granted!';
            statusElement.className = 'success';
            messageElement.textContent = 'Your organization has approved SharePoint access. Redirecting you back to the application...';
            
            // Redirect back to main app after 2 seconds
            setTimeout(() => {
                window.location.href = '/';
            }, 2000);
        } else {
            statusElement.textContent = 'Invalid Request';
            statusElement.className = 'error';
            messageElement.textContent = 'No valid authentication code received.';
            
            // Redirect back to main app after 3 seconds
            setTimeout(() => {
                window.location.href = '/';
            }, 3000);
        }
    </script>
</body>
</html>
